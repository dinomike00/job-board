<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Research Collaboration Board</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.6/handlebars.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Background */
body {
    background-color: #0f2f2f; /* dark turquoise base */
    color: #e8f6f6;
}

/* Cards / job items */
.bg-highlight {
    background: #174a4a;
    color: #e8f6f6;
}

/* Main container */
.bg-white {
    background-color: #123c3c !important;
    color: #e8f6f6;
}

/* Navbar */
.navbar {
    background-color: #0c2626 !important;
}

.navbar .nav-link,
.navbar-brand {
    color: #bfeeee !important;
}

.navbar .nav-link:hover {
    color: #ffffff !important;
}

/* Buttons */
.btn-outline-primary {
    border-color: #20cfcf;
    color: #20cfcf;
}

.btn-outline-primary:hover {
    background-color: #20cfcf;
    color: #0f2f2f;
}

/* Text tweaks */
.text-muted {
    color: #9ccccc !important;
}

/* Borders */
.border-bottom {
    border-color: #2e6f6f !important;
}

</style>
</head>

<body class="bg-light">

<div id="menu-container"></div>

<div class="container" id="jobs-container">
    <div class="text-center p-5">
        <div class="text-muted">Loading opportunities...</div>
    </div>
</div>

<script>

// 🔁 REPLACE WITH YOUR GOOGLE APPS SCRIPT URL
var projectUrl = 'https://script.google.com/macros/s/AKfycbwEcbKUFyuiCQaHdzDXIcTODDvtPLA0j-ms69KBDs-zZQafW0qFcY9qqAIG2bMY-ONAbQ/exec';

var jobs = [];
var categories = [];
var title = '';

document.addEventListener('DOMContentLoaded', function () {
    loadJobs();
    loadCategories();
});

function loadJobs() {
    fetch(projectUrl)
        .then(res => res.json())
        .then(data => {
            jobs = data;
            showAllJobs();
        });
}

// categories based on your form options
function loadCategories() {
    categories = [
        { name: "Join a Research Group/Project" },
        { name: "Literature Review" },
        { name: "Data Analysis/Statistics" },
        { name: "Programming/Machine Learning" },
        { name: "Find Collaborators" }
    ];
    outputCategories();
}

function outputJobs(jobsList) {
    var template = Handlebars.compile(document.getElementById("jobs-template").innerHTML);
    document.getElementById('jobs-container').innerHTML = template({
        title: title,
        jobs: jobsList
    });
}

function outputCategories() {
    var template = Handlebars.compile(document.getElementById("menu-template").innerHTML);
    document.getElementById('menu-container').innerHTML = template(categories);
}

function showAllJobs() {
    title = "All Opportunities";
    outputJobs(jobs);
}

function showCategory(category) {
    title = category;
    let filtered = jobs.filter(j => 
        j.category && j.category.trim().toLowerCase() === category.trim().toLowerCase()
    );
    outputJobs(filtered);
}

function toggleMoreInfo(event) {
    var section = event.target.parentElement.querySelector('.job-more-info');
    section.classList.toggle("d-none");
}

</script>

<!-- MENU -->
<script id="menu-template" type="text/x-handlebars-template">
<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm mb-4">
    <a class="navbar-brand" href="#" onclick="showAllJobs()">Research Board</a>
    <div class="navbar-nav">
        {{#each this}}
        <a class="nav-link" href="#" onclick="showCategory('{{name}}')">{{name}}</a>
        {{/each}}
    </div>
</nav>
</script>

<!-- JOBS -->
<script id="jobs-template" type="text/x-handlebars-template">

<h4 class="mb-3">{{title}}</h4>

<div class="bg-white shadow-sm rounded">

{{#each jobs}}

<div class="border-bottom p-3 bg-highlight">

    <h5 class="mb-1">{{title}}</h5>
    <p class="mb-1"><strong>Subject:</strong> {{subject}}</p>
    <p class="mb-1 text-muted"><strong>Type:</strong> {{category}}</p>

    <p class="job-more-info d-none mt-2">
        <strong>Details:</strong><br>
        {{long_description}}<br><br>

        <strong>Contact:</strong> {{apply_email}}<br>
        <strong>CRSID:</strong> {{company}}
    </p>

    <button class="btn btn-sm btn-outline-primary mt-2" onclick="toggleMoreInfo(event)">
        More info
    </button>

</div>

{{/each}}

{{#unless jobs.length}}
<p class="p-4 text-center text-muted">No opportunities found</p>
{{/unless}}

</div>
</script>

</body>
</html>
